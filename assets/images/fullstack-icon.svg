<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fullstackGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#fullstackGradient)" opacity="0.1"/>
  
  <!-- Stack layers representing full-stack -->
  <!-- Database layer (bottom) -->
  <rect x="20" y="65" width="60" height="8" rx="4" fill="url(#fullstackGradient)" opacity="0.9"/>
  <rect x="25" y="67" width="50" height="4" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Backend layer (middle) -->
  <rect x="20" y="50" width="60" height="8" rx="4" fill="url(#fullstackGradient)" opacity="0.8"/>
  <rect x="25" y="52" width="50" height="4" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Frontend layer (top) -->
  <rect x="20" y="35" width="60" height="8" rx="4" fill="url(#fullstackGradient)" opacity="0.7"/>
  <rect x="25" y="37" width="50" height="4" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Connection lines between layers -->
  <path d="M30 43 L30 50" stroke="url(#fullstackGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 43 L50 50" stroke="url(#fullstackGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M70 43 L70 50" stroke="url(#fullstackGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M30 58 L30 65" stroke="url(#fullstackGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 58 L50 65" stroke="url(#fullstackGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M70 58 L70 65" stroke="url(#fullstackGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- API/Integration symbols -->
  <circle cx="35" cy="25" r="3" fill="url(#fullstackGradient)"/>
  <circle cx="50" cy="25" r="3" fill="url(#fullstackGradient)"/>
  <circle cx="65" cy="25" r="3" fill="url(#fullstackGradient)"/>
  
  <!-- Data flow arrows -->
  <path d="M35 28 L35 32" stroke="url(#fullstackGradient)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 28 L50 32" stroke="url(#fullstackGradient)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M65 28 L65 32" stroke="url(#fullstackGradient)" stroke-width="1.5" stroke-linecap="round"/>
</svg>