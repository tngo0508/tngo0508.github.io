<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="engineeringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#engineeringGradient)" opacity="0.1"/>
  
  <!-- Main gear (large) -->
  <circle cx="45" cy="45" r="18" fill="none" stroke="url(#engineeringGradient)" stroke-width="3"/>
  <circle cx="45" cy="45" r="8" fill="url(#engineeringGradient)" opacity="0.8"/>
  
  <!-- Gear teeth for main gear -->
  <rect x="43" y="25" width="4" height="6" fill="url(#engineeringGradient)"/>
  <rect x="43" y="59" width="4" height="6" fill="url(#engineeringGradient)"/>
  <rect x="25" y="43" width="6" height="4" fill="url(#engineeringGradient)"/>
  <rect x="59" y="43" width="6" height="4" fill="url(#engineeringGradient)"/>
  
  <!-- Diagonal teeth -->
  <rect x="32" y="32" width="4" height="4" fill="url(#engineeringGradient)" transform="rotate(45 34 34)"/>
  <rect x="54" y="32" width="4" height="4" fill="url(#engineeringGradient)" transform="rotate(-45 56 34)"/>
  <rect x="32" y="54" width="4" height="4" fill="url(#engineeringGradient)" transform="rotate(-45 34 56)"/>
  <rect x="54" y="54" width="4" height="4" fill="url(#engineeringGradient)" transform="rotate(45 56 56)"/>
  
  <!-- Smaller gear (interlocking) -->
  <circle cx="68" cy="65" r="12" fill="none" stroke="url(#engineeringGradient)" stroke-width="2"/>
  <circle cx="68" cy="65" r="5" fill="url(#engineeringGradient)" opacity="0.8"/>
  
  <!-- Small gear teeth -->
  <rect x="66" y="51" width="4" height="4" fill="url(#engineeringGradient)"/>
  <rect x="66" y="75" width="4" height="4" fill="url(#engineeringGradient)"/>
  <rect x="54" y="63" width="4" height="4" fill="url(#engineeringGradient)"/>
  <rect x="78" y="63" width="4" height="4" fill="url(#engineeringGradient)"/>
  
  <!-- Tools -->
  <!-- Wrench -->
  <path d="M25 70 L35 75 L32 78 L22 73 Z" fill="url(#engineeringGradient)" opacity="0.7"/>
  <circle cx="23" cy="71" r="2" fill="url(#engineeringGradient)"/>
  
  <!-- Screwdriver -->
  <rect x="20" y="20" width="2" height="15" fill="url(#engineeringGradient)" opacity="0.7"/>
  <rect x="19" y="18" width="4" height="4" fill="url(#engineeringGradient)" opacity="0.9"/>
</svg>