  <path d="M30 50 L40 55 L50 50 L60 55 L70 50" stroke="url(#algorithmGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Central processing node -->
  <circle cx="50" cy="42" r="4" fill="url(#algorithmGradient)"/>
  
  <!-- Algorithm flow arrows -->
  <path d="M45 65 L50 60 L55 65" stroke="url(#algorithmGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
