<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="projectGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <pattern id="projectPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#projectGradient)"/>
  <rect width="1200" height="400" fill="url(#projectPattern)"/>
  
  <!-- Project elements -->
  <g opacity="0.4">
    <!-- Gear/cog -->
    <g transform="translate(200,150)">
      <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
      <circle cx="0" cy="0" r="15" fill="rgba(255,255,255,0.3)"/>
      <rect x="-5" y="-35" width="10" height="10" fill="rgba(255,255,255,0.4)"/>
      <rect x="-5" y="25" width="10" height="10" fill="rgba(255,255,255,0.4)"/>
      <rect x="-35" y="-5" width="10" height="10" fill="rgba(255,255,255,0.4)"/>
      <rect x="25" y="-5" width="10" height="10" fill="rgba(255,255,255,0.4)"/>
    </g>
    
    <!-- Building blocks -->
    <rect x="400" y="120" width="40" height="40" fill="rgba(255,255,255,0.3)"/>
    <rect x="450" y="120" width="40" height="40" fill="rgba(255,255,255,0.25)"/>
    <rect x="425" y="80" width="40" height="40" fill="rgba(255,255,255,0.35)"/>
    
    <!-- Rocket -->
    <g transform="translate(800,200)">
      <polygon points="0,-40 -15,20 15,20" fill="rgba(255,255,255,0.4)"/>
      <circle cx="0" cy="-20" r="8" fill="rgba(255,255,255,0.5)"/>
      <polygon points="-15,20 -25,35 -5,35" fill="rgba(255,255,255,0.3)"/>
      <polygon points="15,20 25,35 5,35" fill="rgba(255,255,255,0.3)"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.2">
    <circle cx="1000" cy="100" r="35" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <rect x="100" y="300" width="50" height="50" rx="8" fill="rgba(255,255,255,0.2)"/>
    <polygon points="1100,300 1150,280 1200,300 1150,320" fill="rgba(255,255,255,0.25)"/>
  </g>
</svg>