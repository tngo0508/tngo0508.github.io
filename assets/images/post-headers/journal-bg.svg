<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="journalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <pattern id="journalPattern" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#journalGradient)"/>
  <rect width="1200" height="400" fill="url(#journalPattern)"/>
  
  <!-- Journal elements -->
  <g opacity="0.3">
    <!-- Notebook lines -->
    <line x1="100" y1="120" x2="500" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="100" y1="140" x2="480" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="100" y1="160" x2="520" y2="160" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="100" y1="180" x2="460" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="100" y1="200" x2="490" y2="200" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    
    <!-- Pen/pencil -->
    <rect x="550" y="150" width="80" height="4" rx="2" fill="rgba(255,255,255,0.5)" transform="rotate(15 590 152)"/>
    <rect x="620" y="148" width="15" height="8" rx="1" fill="rgba(255,255,255,0.6)" transform="rotate(15 627.5 152)"/>
    
    <!-- Coffee cup -->
    <ellipse cx="800" cy="250" rx="25" ry="30" fill="rgba(255,255,255,0.2)"/>
    <ellipse cx="800" cy="240" rx="20" ry="5" fill="rgba(255,255,255,0.3)"/>
    <path d="M 825 240 Q 835 245 825 250" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.2">
    <circle cx="1000" cy="100" r="30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="950" y="300" width="50" height="50" rx="5" fill="rgba(255,255,255,0.15)"/>
    <path d="M 200 300 Q 250 280 300 300 Q 350 320 400 300" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  </g>
</svg>