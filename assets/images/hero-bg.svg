<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#heroGradient)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Code elements -->
  <g opacity="0.3">
    <!-- Terminal window -->
    <rect x="100" y="100" width="300" height="200" rx="8" fill="rgba(0,0,0,0.3)"/>
    <rect x="100" y="100" width="300" height="30" rx="8" fill="rgba(0,0,0,0.5)"/>
    <circle cx="120" cy="115" r="5" fill="#ff5f56"/>
    <circle cx="140" cy="115" r="5" fill="#ffbd2e"/>
    <circle cx="160" cy="115" r="5" fill="#27ca3f"/>
    
    <!-- Code lines -->
    <rect x="120" y="150" width="80" height="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="120" y="165" width="120" height="4" fill="rgba(255,255,255,0.4)"/>
    <rect x="140" y="180" width="100" height="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="120" y="195" width="90" height="4" fill="rgba(255,255,255,0.3)"/>
    
    <!-- Floating code symbols -->
    <text x="800" y="150" font-family="monospace" font-size="24" fill="rgba(255,255,255,0.4)">&lt;/&gt;</text>
    <text x="900" y="200" font-family="monospace" font-size="20" fill="rgba(255,255,255,0.3)">{}</text>
    <text x="750" y="250" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.3)">[]</text>
    <text x="850" y="300" font-family="monospace" font-size="22" fill="rgba(255,255,255,0.4)">()</text>
  </g>
  
  <!-- Geometric shapes -->
  <g opacity="0.2">
    <circle cx="1000" cy="400" r="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <polygon points="200,450 250,400 300,450 250,500" fill="rgba(255,255,255,0.2)"/>
    <rect x="950" y="150" width="80" height="80" rx="10" fill="rgba(255,255,255,0.15)"/>
  </g>
</svg>